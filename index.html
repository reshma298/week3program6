<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        form { border: 1px solid #ccc; padding: 20px; width: 300px; border-radius: 5px; }
        label { font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<form onsubmit="showData(event)">
    <h2>Student Registration</h2>
    <label>Name:</label> <input type="text" id="n">
    <label>Password:</label> <input type="password" id="p">
    <label>Email:</label> <input type="email" id="e">
   
    <label>Gender:</label>
    <input type="radio" name="g" value="Male"> Male
    <input type="radio" name="g" value="Female"> Female

    <label>Hobbies:</label>
    <input type="checkbox" name="h" value="Reading"> Reading
    <input type="checkbox" name="h" value="Sports"> Sports

    <label>Department:</label>
    <select id="d"><option>CSE</option><option>IT</option></select>

    <label>Skills:</label>
    <select id="s" multiple size="2"><option>HTML</option><option>CSS</option></select>
    <br><br>
   
    <input type="submit" value="Register">
    <input type="reset" value="Clear">
</form>

<script>
function showData(event) {
    event.preventDefault(); // Prevents the page from reloading
   
    let name = document.getElementById('n').value || 'None';
    let email = document.getElementById('e').value || 'None';
    let dept = document.getElementById('d').value;
   
    let genderOpt = document.querySelector('input[name="g"]:checked');
    let gender = genderOpt ? genderOpt.value : 'None';

    let hobbies = Array.from(document.querySelectorAll('input[name="h"]:checked')).map(c => c.value).join(', ') || 'None';
    let skills = Array.from(document.getElementById('s').selectedOptions).map(o => o.value).join(', ') || 'None';

    // Displays the collected info in a dialog alert box
    alert(
        "--- Registered Information ---\n\n" +
        "Name: " + name + "\n" +
        "Email: " + email + "\n" +
        "Gender: " + gender + "\n" +
        "Hobbies: " + hobbies + "\n" +
        "Department: " + dept + "\n" +
        "Skills: " + skills
    );
}
</script>

</body>
</html>
